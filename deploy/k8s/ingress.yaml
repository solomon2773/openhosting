apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openhosting
  namespace: openhosting
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - billing.example.com
      secretName: openhosting-tls
  rules:
    - host: billing.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openhosting
                port:
                  number: 80
