# Copy to secret.yaml, fill in real values, then:
#   kubectl apply -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: openhosting-secrets
  namespace: openhosting
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@your-postgres:5432/openhosting"
  DIRECT_URL: "postgresql://user:password@your-postgres:5432/openhosting"
  CRON_SECRET: "generate-with-openssl-rand-hex-32"
